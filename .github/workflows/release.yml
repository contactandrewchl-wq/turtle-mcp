# Publica binarios autocontenidos de `turtle` por SO/arquitectura (RNF-INS-01/02, TM-34..TM-36).
#
# - En un tag `vX.Y.Z`: compila la matriz y adjunta los archivos al GitHub Release.
# - En `workflow_dispatch`: compila la matriz y deja los binarios como artefactos (sin publicar).
# - En `pull_request` que toque este propio archivo: valida que la matriz siga compilando.
#
# Linux usa musl estático vía `cargo-zigbuild` (Zig aporta el toolchain de C que necesita el
# SQLite embebido al cross-compilar). macOS y Windows compilan de forma nativa/cruzada en su runner.
# Sin npm/Node (regla dura del proyecto). Ver arquitectura §10.
name: release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths: [".github/workflows/release.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            zig: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            zig: true
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Instalar toolchain de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache de cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Instalar Zig
        if: matrix.zig
        uses: mlugg/setup-zig@v2

      - name: Instalar cargo-zigbuild
        if: matrix.zig
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Compilar (musl estático con Zig)
        if: matrix.zig
        run: cargo zigbuild --release --locked --target ${{ matrix.target }} --bin turtle

      - name: Compilar (nativo)
        if: ${{ !matrix.zig }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin turtle

      - name: Empaquetar
        shell: bash
        run: |
          dist="turtle-${{ matrix.target }}"
          mkdir -p "$dist"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/turtle.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/turtle" "$dist/"
          fi
          cp README.md "$dist/"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$dist.zip" "$dist" >/dev/null
            echo "ASSET=$dist.zip" >> "$GITHUB_ENV"
          else
            tar -czf "$dist.tar.gz" "$dist"
            echo "ASSET=$dist.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Subir artefacto del workflow
        uses: actions/upload-artifact@v4
        with:
          name: turtle-${{ matrix.target }}
          path: ${{ env.ASSET }}

      - name: Adjuntar al Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
